<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wavely</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #282828;
    --accent: #1db954;
    --accent2: #1ed760;
    --text: #ffffff;
    --text2: #b3b3b3;
    --text3: #6a6a6a;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-full: 9999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; position: relative; }
  
  /* Header */
  #header { padding: 16px 20px 8px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  #logo span { color: var(--accent); }
  #header-actions { display: flex; gap: 8px; }
  .icon-btn { width: 38px; height: 38px; border-radius: var(--radius-full); background: var(--surface2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 18px; transition: all 0.15s; }
  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .icon-btn.active { color: var(--accent); }

  /* Search */
  #search-wrap { padding: 8px 20px 12px; flex-shrink: 0; }
  #search-box { width: 100%; background: var(--surface2); border: 1.5px solid transparent; border-radius: var(--radius-full); padding: 10px 16px 10px 40px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; position: relative; }
  #search-box:focus { border-color: var(--accent); }
  #search-icon { position: absolute; left: 32px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
  #search-container { position: relative; }
  #clear-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; display: none; padding: 4px; }

  /* Tabs */
  #tabs { display: flex; padding: 0 20px; gap: 4px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .tab { padding: 10px 14px; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Content area */
  #content { flex: 1; overflow-y: auto; padding: 16px 20px; scroll-behavior: smooth; }
  #content::-webkit-scrollbar { width: 4px; }
  #content::-webkit-scrollbar-track { background: transparent; }
  #content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* Section headers */
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
  .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .see-all { font-size: 13px; color: var(--accent); cursor: pointer; font-weight: 500; }

  /* Track list */
  .track-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; position: relative; }
  .track-item:hover, .track-item.active { background: var(--surface2); }
  .track-item.active .track-name { color: var(--accent); }
  .track-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--surface3); flex-shrink: 0; overflow: hidden; position: relative; }
  .track-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .track-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-duration { font-size: 12px; color: var(--text3); flex-shrink: 0; }
  .track-playing { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); display: none; }
  .track-item.playing .track-playing { display: block; }
  .track-item.playing .track-thumb-placeholder { filter: brightness(0.5); }

  /* Now playing indicator bars */
  .bars { display: flex; gap: 2px; align-items: flex-end; height: 16px; }
  .bar { width: 3px; background: var(--accent); border-radius: 2px; animation: bounce 0.8s ease-in-out infinite alternate; }
  .bar:nth-child(2) { animation-delay: 0.15s; height: 10px; }
  .bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0% { height: 4px; } 100% { height: 16px; } }

  /* Horizontal scroll cards */
  .card-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .card-scroll::-webkit-scrollbar { display: none; }
  .mood-card { flex-shrink: 0; width: 130px; height: 80px; border-radius: var(--radius); display: flex; align-items: flex-end; padding: 10px 12px; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.2s; }
  .mood-card:hover { transform: scale(0.97); }
  .mood-label { font-size: 14px; font-weight: 700; position: relative; z-index: 1; }
  .mood-card::before { content: ''; position: absolute; inset: 0; opacity: 0.85; }

  .mood-chill { background: linear-gradient(135deg, #1a1a2e, #16213e); }
  .mood-chill::before { background: linear-gradient(135deg, #4facfe, #00f2fe); opacity: 0.2; }
  .mood-energy { background: linear-gradient(135deg, #2d1b1b, #3a1a1a); }
  .mood-energy::before { background: linear-gradient(135deg, #f093fb, #f5576c); opacity: 0.2; }
  .mood-focus { background: linear-gradient(135deg, #1a2e1a, #162e16); }
  .mood-focus::before { background: linear-gradient(135deg, #43e97b, #38f9d7); opacity: 0.2; }
  .mood-hype { background: linear-gradient(135deg, #2e1a1a, #2e2a1a); }
  .mood-hype::before { background: linear-gradient(135deg, #fa709a, #fee140); opacity: 0.2; }
  .mood-sleep { background: linear-gradient(135deg, #1a1a2e, #1a1e2e); }
  .mood-sleep::before { background: linear-gradient(135deg, #a18cd1, #fbc2eb); opacity: 0.2; }

  /* Results */
  #results-section { display: none; }
  #home-section {}
  .result-count { font-size: 13px; color: var(--text3); margin-bottom: 12px; }
  .no-results { text-align: center; padding: 40px 20px; }
  .no-results-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results p { color: var(--text2); font-size: 15px; }

  /* Loading */
  .spinner { width: 20px; height: 20px; border: 2px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #search-loading { display: none; text-align: center; padding: 30px; }

  /* Mini player */
  #mini-player { display: none; flex-direction: column; background: var(--surface); border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  #mini-player.visible { display: flex; }
  #mini-player-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; }
  #mini-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--surface3); flex-shrink: 0; overflow: hidden; }
  #mini-thumb img { width: 100%; height: 100%; object-fit: cover; }
  #mini-info { flex: 1; min-width: 0; }
  #mini-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #mini-artist { font-size: 12px; color: var(--text2); }
  #mini-controls { display: flex; gap: 4px; align-items: center; }
  .ctrl-btn { width: 36px; height: 36px; border: none; background: none; cursor: pointer; color: var(--text2); font-size: 20px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-full); transition: all 0.15s; }
  .ctrl-btn:hover { background: var(--surface2); color: var(--text); }
  .ctrl-btn.play-btn { width: 40px; height: 40px; background: var(--accent); color: #000; font-size: 18px; border-radius: var(--radius-full); }
  .ctrl-btn.play-btn:hover { background: var(--accent2); }
  #progress-bar-wrap { height: 3px; background: var(--surface3); cursor: pointer; }
  #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s linear; }

  /* Full player panel */
  #player-panel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
  #player-panel.open { transform: translateY(0); }
  #player-handle { padding: 12px; display: flex; justify-content: center; flex-shrink: 0; cursor: pointer; }
  #player-handle div { width: 36px; height: 4px; background: var(--surface3); border-radius: 2px; }
  #player-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 0 24px 24px; }
  #player-art { width: 100%; max-width: 300px; aspect-ratio: 1; border-radius: 16px; background: var(--surface2); margin: 20px auto 28px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
  #player-art img { width: 100%; height: 100%; object-fit: cover; }
  #player-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; }
  #player-track-info { width: 100%; text-align: center; margin-bottom: 24px; }
  #player-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  #player-artist { font-size: 16px; color: var(--text2); }
  #player-like { margin-top: 10px; }
  #player-like svg { transition: all 0.2s; }
  #player-like.liked svg { fill: var(--accent); stroke: var(--accent); }

  /* Player seek */
  #seek-wrap { width: 100%; margin-bottom: 16px; }
  #seek-slider { width: 100%; -webkit-appearance: none; height: 4px; background: var(--surface3); border-radius: 2px; outline: none; cursor: pointer; }
  #seek-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text); cursor: pointer; }
  #seek-slider::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--seek-pct, 0%), var(--surface3) var(--seek-pct, 0%)); border-radius: 2px; height: 4px; }
  #seek-times { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-top: 6px; }

  /* Player main controls */
  #player-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 24px; }
  .p-ctrl { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 22px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; border-radius: var(--radius-full); width: 44px; height: 44px; }
  .p-ctrl:hover { color: var(--text); background: var(--surface2); }
  .p-ctrl.active { color: var(--accent); }
  #big-play { width: 64px; height: 64px; background: var(--text); color: var(--bg); border-radius: var(--radius-full); font-size: 28px; }
  #big-play:hover { background: var(--accent2); color: #000; transform: scale(1.04); }

  /* Volume */
  #volume-wrap { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 20px; }
  #vol-icon { color: var(--text3); font-size: 18px; }
  #vol-slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--surface3); border-radius: 2px; outline: none; cursor: pointer; }
  #vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text); cursor: pointer; }

  /* Queue in player */
  #queue-section { width: 100%; margin-top: 8px; }
  #queue-section h3 { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* YouTube iframe (hidden) */
  #yt-frame { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

  /* Toast */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface3); color: var(--text); padding: 10px 20px; border-radius: var(--radius-full); font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Liked songs page */
  #liked-section { display: none; }
  #queue-tab-section { display: none; }

  /* Empty state for liked */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { color: var(--text2); font-size: 14px; line-height: 1.5; }

  /* Backend status pill */
  #api-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #e74c3c; }
  .status-dot.connected { background: var(--accent); }

  /* Responsive desktop */
  @media (min-width: 431px) {
    #app { box-shadow: 0 0 60px rgba(0,0,0,0.8); border-radius: 16px; overflow: hidden; margin: 20px auto; height: calc(100vh - 40px); }
    body { background: #050505; display: flex; align-items: center; justify-content: center; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="logo">Wave<span>ly</span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="api-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Demo mode</span>
      </div>
      <div id="header-actions">
        <button class="icon-btn" id="settings-btn" title="Settings" onclick="showToast('Connect your backend in settings')">⚙️</button>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div id="search-wrap">
    <div id="search-container">
      <span id="search-icon">🔍</span>
      <input id="search-box" type="text" placeholder="Search songs, artists, albums..." autocomplete="off">
      <button id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <div class="tab active" onclick="switchTab('home')">Home</div>
    <div class="tab" onclick="switchTab('liked')">Liked</div>
    <div class="tab" onclick="switchTab('queue')">Queue</div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Home section -->
    <div id="home-section">
      <!-- Moods -->
      <div class="section-title">Browse moods</div>
      <div class="card-scroll" style="margin-bottom:24px;">
        <div class="mood-card mood-chill" onclick="searchMood('chill vibes lofi')"><span class="mood-label">Chill</span></div>
        <div class="mood-card mood-energy" onclick="searchMood('high energy workout')"><span class="mood-label">Energy</span></div>
        <div class="mood-card mood-focus" onclick="searchMood('focus study music')"><span class="mood-label">Focus</span></div>
        <div class="mood-card mood-hype" onclick="searchMood('hype party hits')"><span class="mood-label">Hype</span></div>
        <div class="mood-card mood-sleep" onclick="searchMood('sleep calm ambient')"><span class="mood-label">Sleep</span></div>
      </div>

      <!-- Trending -->
      <div class="section-row">
        <div class="section-title" style="margin:0;">Trending now</div>
        <span class="see-all" onclick="searchMood('trending hits 2025')">See all</span>
      </div>
      <div id="trending-list"></div>

      <!-- Recently played (stored locally) -->
      <div id="recent-wrap" style="display:none; margin-top:20px;">
        <div class="section-title">Recently played</div>
        <div id="recent-list"></div>
      </div>
    </div>

    <!-- Search results -->
    <div id="results-section">
      <div id="search-loading"><div class="spinner"></div></div>
      <div id="results-count" class="result-count"></div>
      <div id="results-list"></div>
    </div>

    <!-- Liked songs -->
    <div id="liked-section">
      <div class="section-title">Liked songs</div>
      <div id="liked-list"></div>
    </div>

    <!-- Queue -->
    <div id="queue-tab-section">
      <div class="section-title">Play queue</div>
      <div id="queue-full-list"></div>
    </div>

  </div>

  <!-- Mini player -->
  <div id="mini-player">
    <div id="progress-bar-wrap" onclick="handleProgressClick(event)">
      <div id="progress-bar"></div>
    </div>
    <div id="mini-player-bar" onclick="openPlayer()">
      <div id="mini-thumb"><img id="mini-thumb-img" src="" alt="" style="display:none;"></div>
      <div id="mini-info">
        <div id="mini-title">Nothing playing</div>
        <div id="mini-artist"></div>
      </div>
      <div id="mini-controls" onclick="event.stopPropagation()">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="ctrl-btn play-btn" id="mini-play-btn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      </div>
    </div>
  </div>

  <!-- Full player -->
  <div id="player-panel">
    <div id="player-handle" onclick="closePlayer()"><div></div></div>
    <div id="player-scroll">
      <div id="player-art">
        <div id="player-art-placeholder">🎵</div>
        <img id="player-art-img" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover;">
      </div>
      <div id="player-track-info">
        <div id="player-title">Select a song</div>
        <div id="player-artist" style="color:var(--text2);font-size:15px;margin-top:4px;"></div>
        <button id="player-like" class="icon-btn" style="margin-top:12px;background:none;border:1px solid rgba(255,255,255,0.15);" onclick="toggleLike()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
      </div>

      <!-- Seek -->
      <div id="seek-wrap">
        <input type="range" id="seek-slider" min="0" max="100" value="0" oninput="handleSeek(this.value)">
        <div id="seek-times"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
      </div>

      <!-- Controls -->
      <div id="player-controls">
        <button class="p-ctrl" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
        <button class="p-ctrl" onclick="prevTrack()" title="Previous">⏮</button>
        <button class="p-ctrl" id="big-play" onclick="togglePlay()">▶</button>
        <button class="p-ctrl" onclick="nextTrack()" title="Next">⏭</button>
        <button class="p-ctrl" id="repeat-btn" onclick="toggleRepeat()" title="Repeat">🔁</button>
      </div>

      <!-- Volume -->
      <div id="volume-wrap">
        <span id="vol-icon">🔈</span>
        <input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        <span style="font-size:12px;color:var(--text3);" id="vol-pct">80%</span>
      </div>

      <!-- Queue in player -->
      <div id="queue-section">
        <h3>Up next</h3>
        <div id="queue-in-player"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden YT iframe for audio extraction fallback -->
<div id="yt-frame"></div>

<script>
// ============================================
// STATE
// ============================================
let state = {
  queue: [],
  currentIndex: -1,
  isPlaying: false,
  shuffle: false,
  repeat: 'none', // none, one, all
  likedSongs: JSON.parse(localStorage.getItem('wavely_liked') || '[]'),
  recentPlayed: JSON.parse(localStorage.getItem('wavely_recent') || '[]'),
  currentTab: 'home',
  ytPlayer: null,
  ytReady: false,
  seeking: false,
  progressInterval: null,
  backendUrl: localStorage.getItem('wavely_backend') || null,
  volume: 80,
};

// Demo tracks (used when no backend connected)
const DEMO_TRACKS = [
  { id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up', artist: 'Rick Astley', duration: '3:33', thumb: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg' },
  { id: 'kJQP7kiw5Fk', title: 'Despacito', artist: 'Luis Fonsi ft. Daddy Yankee', duration: '4:42', thumb: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg' },
  { id: 'JGwWNGJdvx8', title: 'Shape of You', artist: 'Ed Sheeran', duration: '3:53', thumb: 'https://img.youtube.com/vi/JGwWNGJdvx8/mqdefault.jpg' },
  { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk', artist: 'Mark Ronson ft. Bruno Mars', duration: '4:30', thumb: 'https://img.youtube.com/vi/OPf0YbXqDm0/mqdefault.jpg' },
  { id: '09R8_2nJtjg', title: 'Sugar', artist: 'Maroon 5', duration: '3:55', thumb: 'https://img.youtube.com/vi/09R8_2nJtjg/mqdefault.jpg' },
  { id: 'fRh_vgS2dFE', title: 'Sorry', artist: 'Justin Bieber', duration: '3:20', thumb: 'https://img.youtube.com/vi/fRh_vgS2dFE/mqdefault.jpg' },
  { id: 'nfWlot6h_JM', title: 'Shake It Off', artist: 'Taylor Swift', duration: '3:39', thumb: 'https://img.youtube.com/vi/nfWlot6h_JM/mqdefault.jpg' },
  { id: 'PT2_F-1esPk', title: 'Stressed Out', artist: 'Twenty One Pilots', duration: '3:22', thumb: 'https://img.youtube.com/vi/PT2_F-1esPk/mqdefault.jpg' },
];

// ============================================
// YOUTUBE IFRAME API
// ============================================
window.onYouTubeIframeAPIReady = function() {
  state.ytPlayer = new YT.Player('yt-player-el', {
    height: '1',
    width: '1',
    playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
    events: {
      onReady: () => { state.ytReady = true; setVolume(state.volume); },
      onStateChange: onYTStateChange,
      onError: onYTError,
    }
  });
};

function onYTStateChange(e) {
  const S = YT.PlayerState;
  if (e.data === S.PLAYING) {
    state.isPlaying = true;
    updatePlayUI();
    startProgress();
  } else if (e.data === S.PAUSED) {
    state.isPlaying = false;
    updatePlayUI();
    stopProgress();
  } else if (e.data === S.ENDED) {
    handleTrackEnd();
  }
}

function onYTError(e) {
  console.warn('YT error', e.data);
  showToast('Could not play this track');
  nextTrack();
}

function loadYTScript() {
  const el = document.createElement('div');
  el.id = 'yt-player-el';
  document.getElementById('yt-frame').appendChild(el);
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

// ============================================
// TABS
// ============================================
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['home','liked','queue'][i] === tab);
  });
  document.getElementById('home-section').style.display = tab === 'home' ? 'block' : 'none';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('liked-section').style.display = tab === 'liked' ? 'block' : 'none';
  document.getElementById('queue-tab-section').style.display = tab === 'queue' ? 'block' : 'none';
  if (tab === 'liked') renderLikedSongs();
  if (tab === 'queue') renderQueueTab();
}

// ============================================
// SEARCH
// ============================================
const searchBox = document.getElementById('search-box');
const clearBtn = document.getElementById('clear-btn');
let searchTimer = null;

searchBox.addEventListener('input', () => {
  const q = searchBox.value.trim();
  clearBtn.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { showHomeTab(); return; }
  searchTimer = setTimeout(() => doSearch(q), 500);
});

function clearSearch() {
  searchBox.value = '';
  clearBtn.style.display = 'none';
  showHomeTab();
}

function showHomeTab() {
  document.getElementById('home-section').style.display = state.currentTab === 'home' ? 'block' : 'none';
  document.getElementById('results-section').style.display = 'none';
}

async function doSearch(q) {
  document.getElementById('home-section').style.display = 'none';
  document.getElementById('liked-section').style.display = 'none';
  document.getElementById('queue-tab-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('search-loading').style.display = 'block';
  document.getElementById('results-list').innerHTML = '';
  document.getElementById('results-count').textContent = '';

  let results = [];

  if (state.backendUrl) {
    try {
      const r = await fetch(`${state.backendUrl}/search?q=${encodeURIComponent(q)}`);
      results = await r.json();
    } catch {
      showToast('Backend offline — showing demo results');
      results = filterDemo(q);
    }
  } else {
    await new Promise(r => setTimeout(r, 600));
    results = filterDemo(q);
  }

  document.getElementById('search-loading').style.display = 'none';
  document.getElementById('results-count').textContent = `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`;

  if (!results.length) {
    document.getElementById('results-list').innerHTML = `<div class="no-results"><div class="no-results-icon">🎵</div><p>No results found.<br>Try a different search.</p></div>`;
    return;
  }

  document.getElementById('results-list').innerHTML = results.map((t, i) => trackHTML(t, i, 'results')).join('');
}

function filterDemo(q) {
  const lq = q.toLowerCase();
  const filtered = DEMO_TRACKS.filter(t =>
    t.title.toLowerCase().includes(lq) || t.artist.toLowerCase().includes(lq)
  );
  return filtered.length ? filtered : DEMO_TRACKS.slice(0, 5);
}

function searchMood(query) {
  searchBox.value = query;
  clearBtn.style.display = 'block';
  doSearch(query);
}

// ============================================
// RENDER TRACKS
// ============================================
function trackHTML(track, index, context) {
  const isCurrent = state.queue[state.currentIndex]?.id === track.id;
  const isPlaying = isCurrent && state.isPlaying;
  const liked = state.likedSongs.some(s => s.id === track.id);
  const thumb = track.thumb || `https://img.youtube.com/vi/${track.id}/mqdefault.jpg`;

  return `<div class="track-item${isCurrent ? ' active' : ''}${isPlaying ? ' playing' : ''}"
    onclick="playFromContext('${context}', ${index})"
    id="track-${context}-${index}">
    <div class="track-thumb">
      <img src="${thumb}" onerror="this.style.display='none'" loading="lazy">
      <div class="track-thumb-placeholder" style="${thumb ? 'display:none' : ''}">🎵</div>
      <div class="track-playing">
        <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      </div>
    </div>
    <div class="track-info">
      <div class="track-name">${esc(track.title)}</div>
      <div class="track-meta">${esc(track.artist || '')}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      ${track.duration ? `<span class="track-duration">${track.duration}</span>` : ''}
    </div>
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================
// PLAYBACK
// ============================================
function playFromContext(context, index) {
  let tracks = [];
  if (context === 'results') tracks = getResultsTracks();
  else if (context === 'trending') tracks = DEMO_TRACKS.slice(0, 6);
  else if (context === 'liked') tracks = [...state.likedSongs];
  else if (context === 'recent') tracks = [...state.recentPlayed];
  else if (context === 'queue') tracks = [...state.queue];

  if (!tracks.length) return;

  state.queue = [...tracks];
  state.currentIndex = index;
  loadAndPlay();
}

function getResultsTracks() {
  const items = document.querySelectorAll('#results-list .track-item');
  const tracks = [];
  items.forEach(el => {
    const name = el.querySelector('.track-name')?.textContent || '';
    const artist = el.querySelector('.track-meta')?.textContent || '';
    const dur = el.querySelector('.track-duration')?.textContent || '';
    const img = el.querySelector('img');
    const thumb = img ? img.src : '';
    const idMatch = thumb.match(/vi\/([^/]+)\//);
    const id = idMatch ? idMatch[1] : null;
    if (id) tracks.push({ id, title: name, artist, duration: dur, thumb });
  });
  return tracks;
}

function loadAndPlay() {
  const track = state.queue[state.currentIndex];
  if (!track) return;

  addToRecent(track);
  updateNowPlayingUI(track);

  if (!state.ytReady) {
    loadYTScript();
    const wait = setInterval(() => {
      if (state.ytReady) { clearInterval(wait); actualPlay(track.id); }
    }, 200);
    return;
  }
  actualPlay(track.id);
}

function actualPlay(videoId) {
  if (state.ytPlayer && state.ytReady) {
    state.ytPlayer.loadVideoById(videoId);
    state.ytPlayer.playVideo();
  }
}

function togglePlay() {
  if (!state.ytPlayer || state.currentIndex < 0) return;
  if (state.isPlaying) {
    state.ytPlayer.pauseVideo();
  } else {
    state.ytPlayer.playVideo();
  }
}

function nextTrack() {
  if (!state.queue.length) return;
  if (state.shuffle) {
    let next;
    do { next = Math.floor(Math.random() * state.queue.length); } while (next === state.currentIndex && state.queue.length > 1);
    state.currentIndex = next;
  } else {
    state.currentIndex = (state.currentIndex + 1) % state.queue.length;
  }
  loadAndPlay();
}

function prevTrack() {
  if (!state.queue.length) return;
  const dur = state.ytPlayer?.getCurrentTime?.() || 0;
  if (dur > 3) { state.ytPlayer.seekTo(0); return; }
  state.currentIndex = (state.currentIndex - 1 + state.queue.length) % state.queue.length;
  loadAndPlay();
}

function handleTrackEnd() {
  if (state.repeat === 'one') {
    state.ytPlayer.seekTo(0);
    state.ytPlayer.playVideo();
  } else if (state.repeat === 'all' || state.currentIndex < state.queue.length - 1) {
    nextTrack();
  } else {
    state.isPlaying = false;
    updatePlayUI();
  }
}

// ============================================
// UI UPDATES
// ============================================
function updateNowPlayingUI(track) {
  const thumb = track.thumb || `https://img.youtube.com/vi/${track.id}/mqdefault.jpg`;

  // Mini player
  document.getElementById('mini-player').classList.add('visible');
  document.getElementById('mini-title').textContent = track.title;
  document.getElementById('mini-artist').textContent = track.artist || '';
  const miniImg = document.getElementById('mini-thumb-img');
  miniImg.src = thumb;
  miniImg.style.display = 'block';

  // Full player
  document.getElementById('player-title').textContent = track.title;
  document.getElementById('player-artist').textContent = track.artist || '';
  const artImg = document.getElementById('player-art-img');
  artImg.src = thumb;
  artImg.style.display = 'block';
  document.getElementById('player-art-placeholder').style.display = 'none';

  // Like btn
  const liked = state.likedSongs.some(s => s.id === track.id);
  document.getElementById('player-like').classList.toggle('liked', liked);

  updatePlayUI();
  renderQueueInPlayer();
}

function updatePlayUI() {
  const icon = state.isPlaying ? '⏸' : '▶';
  document.getElementById('mini-play-btn').textContent = icon;
  document.getElementById('big-play').textContent = icon;
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  document.getElementById('shuffle-btn').classList.toggle('active', state.shuffle);
  showToast(state.shuffle ? 'Shuffle on' : 'Shuffle off');
}

function toggleRepeat() {
  const modes = ['none', 'all', 'one'];
  state.repeat = modes[(modes.indexOf(state.repeat) + 1) % 3];
  const btn = document.getElementById('repeat-btn');
  btn.classList.toggle('active', state.repeat !== 'none');
  btn.textContent = state.repeat === 'one' ? '🔂' : '🔁';
  const labels = { none: 'Repeat off', all: 'Repeat all', one: 'Repeat one' };
  showToast(labels[state.repeat]);
}

// ============================================
// PROGRESS
// ============================================
function startProgress() {
  stopProgress();
  state.progressInterval = setInterval(updateProgress, 500);
}

function stopProgress() {
  clearInterval(state.progressInterval);
}

function updateProgress() {
  if (!state.ytPlayer || !state.ytReady) return;
  const curr = state.ytPlayer.getCurrentTime?.() || 0;
  const total = state.ytPlayer.getDuration?.() || 0;
  if (!total) return;
  const pct = (curr / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  if (!state.seeking) {
    const slider = document.getElementById('seek-slider');
    slider.value = pct;
    slider.style.setProperty('--seek-pct', pct + '%');
  }
  document.getElementById('time-current').textContent = fmtTime(curr);
  document.getElementById('time-total').textContent = fmtTime(total);
}

function handleSeek(val) {
  state.seeking = true;
  const slider = document.getElementById('seek-slider');
  slider.style.setProperty('--seek-pct', val + '%');
  document.getElementById('time-current').textContent = fmtTime((val / 100) * (state.ytPlayer?.getDuration?.() || 0));
  clearTimeout(state.seekTimer);
  state.seekTimer = setTimeout(() => {
    const dur = state.ytPlayer?.getDuration?.() || 0;
    state.ytPlayer?.seekTo(dur * val / 100);
    state.seeking = false;
  }, 200);
}

function handleProgressClick(e) {
  const bar = document.getElementById('progress-bar-wrap');
  const pct = e.offsetX / bar.offsetWidth;
  const dur = state.ytPlayer?.getDuration?.() || 0;
  state.ytPlayer?.seekTo(dur * pct);
}

function fmtTime(secs) {
  const s = Math.floor(secs);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function setVolume(val) {
  state.volume = parseInt(val);
  document.getElementById('vol-pct').textContent = val + '%';
  document.getElementById('vol-icon').textContent = val > 50 ? '🔊' : val > 0 ? '🔉' : '🔈';
  state.ytPlayer?.setVolume?.(parseInt(val));
}

// ============================================
// FULL PLAYER
// ============================================
function openPlayer() {
  document.getElementById('player-panel').classList.add('open');
}
function closePlayer() {
  document.getElementById('player-panel').classList.remove('open');
}

// Swipe to close
let startY = 0;
document.getElementById('player-panel').addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
document.getElementById('player-panel').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 80) closePlayer();
}, { passive: true });

// ============================================
// LIKES
// ============================================
function toggleLike() {
  const track = state.queue[state.currentIndex];
  if (!track) return;
  const idx = state.likedSongs.findIndex(s => s.id === track.id);
  if (idx >= 0) {
    state.likedSongs.splice(idx, 1);
    document.getElementById('player-like').classList.remove('liked');
    showToast('Removed from liked songs');
  } else {
    state.likedSongs.unshift(track);
    document.getElementById('player-like').classList.add('liked');
    showToast('Added to liked songs ♡');
  }
  localStorage.setItem('wavely_liked', JSON.stringify(state.likedSongs));
}

function renderLikedSongs() {
  const list = document.getElementById('liked-list');
  if (!state.likedSongs.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">♡</div><h3>No liked songs yet</h3><p>Like songs while playing them<br>and they'll appear here.</p></div>`;
    return;
  }
  list.innerHTML = state.likedSongs.map((t, i) => trackHTML(t, i, 'liked')).join('');
}

// ============================================
// RECENT
// ============================================
function addToRecent(track) {
  state.recentPlayed = state.recentPlayed.filter(t => t.id !== track.id);
  state.recentPlayed.unshift(track);
  state.recentPlayed = state.recentPlayed.slice(0, 10);
  localStorage.setItem('wavely_recent', JSON.stringify(state.recentPlayed));
  renderRecent();
}

function renderRecent() {
  if (!state.recentPlayed.length) return;
  document.getElementById('recent-wrap').style.display = 'block';
  document.getElementById('recent-list').innerHTML = state.recentPlayed.slice(0, 5).map((t, i) => trackHTML(t, i, 'recent')).join('');
}

// ============================================
// QUEUE
// ============================================
function renderQueueInPlayer() {
  const upcoming = state.queue.slice(state.currentIndex + 1, state.currentIndex + 6);
  if (!upcoming.length) {
    document.getElementById('queue-in-player').innerHTML = '<p style="color:var(--text3);font-size:13px;">Queue is empty</p>';
    return;
  }
  document.getElementById('queue-in-player').innerHTML = upcoming.map((t, i) =>
    trackHTML(t, state.currentIndex + 1 + i, 'queue')
  ).join('');
}

function renderQueueTab() {
  const list = document.getElementById('queue-full-list');
  if (!state.queue.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Queue is empty</h3><p>Search for a song and play it<br>to build your queue.</p></div>`;
    return;
  }
  list.innerHTML = state.queue.map((t, i) => trackHTML(t, i, 'queue')).join('');
}

// ============================================
// TRENDING (demo)
// ============================================
function renderTrending() {
  document.getElementById('trending-list').innerHTML = DEMO_TRACKS.slice(0, 6).map((t, i) => trackHTML(t, i, 'trending')).join('');
}

// ============================================
// TOAST
// ============================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================
// BACKEND CHECK
// ============================================
async function checkBackend() {
  if (!state.backendUrl) return;
  try {
    const r = await fetch(`${state.backendUrl}/ping`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      document.getElementById('status-dot').classList.add('connected');
      document.getElementById('status-text').textContent = 'Live';
    }
  } catch { /* offline */ }
}

// ============================================
// INIT
// ============================================
renderTrending();
renderRecent();
checkBackend();
loadYTScript();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
});
</script>
